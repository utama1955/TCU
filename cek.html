<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Laporan Saya</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
padding:20px;
box-sizing:border-box;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-top:0;
margin-bottom:25px;
}

.section{
margin-bottom:30px;
}

.section-title{
padding:10px 15px;
border-radius:8px;
color:white;
font-weight:bold;
font-size:14px;
margin-bottom:12px;
display:inline-block;
}

.waiting{ background:#f39c12; }
.process{ background:#3498db; }
.pending{ background:#9b59b6; }
.done{ background:#27ae60; }

.card{
background:#f8f8f8;
padding:15px;
border-radius:10px;
margin-bottom:10px;
border:1px solid #eee;
transition:0.2s;
}

.card:hover{
background:#f1f1f1;
transform:translateY(-2px);
}

.ticket-id{
font-weight:bold;
margin-bottom:6px;
}

.label{
font-size:13px;
color:#555;
}

.value{
margin-bottom:6px;
font-size:14px;
}

.back-btn{
margin-top:20px;
width:100%;
padding:12px;
background:#6c757d;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.back-btn:hover{
background:#5a6268;
}

.empty{
text-align:center;
color:#777;
font-size:14px;
margin-top:20px;
}

</style>
</head>

<body>

<script>
const token = localStorage.getItem("token");
if(!token){
window.location.href="login.html";
}
</script>

<div class="container">

<h2>CEK LAPORAN SAYA</h2>

<div id="content"></div>

<button class="back-btn" onclick="window.location.href='index.html'">
← Kembali ke Menu Utama
</button>

</div>

<script src="config.js"></script>
<script src="cek.js"></script>

</body>
</html>
