<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lapor Kerusakan</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:420px;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-top:0;
color:#333;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:10px;
box-sizing:border-box;
font-size:14px;
border:1px solid #ccc;
border-radius:6px;
transition:0.3s;
}

input:focus,
textarea:focus,
select:focus{
border-color:#2c5364;
outline:none;
box-shadow:0 0 5px rgba(44,83,100,0.5);
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2c5364;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
background:#203a43;
}

#hasil{
margin-top:15px;
text-align:center;
}

a{
display:block;
margin-top:15px;
}

</style>

</head>

<body>
<script>
const token = localStorage.getItem("token");

if(!token){
  alert("Silakan login terlebih dahulu");
  window.location.href="login.html";
}
</script>
  
<div class="container">

<h2>LAPOR KERUSAKAN</h2>

<form id="formLapor">
<label style="margin-top:10px; display:block;">Nama Pelapor</label>
<input type="text" id="nama" placeholder="Nama Lengkap">
<label style="margin-top:10px; display:block;">Cabang</label>
<input type="text" id="cabang" placeholder="Cabang Kerja">
<label style="margin-top:10px; display:block;">Nama Aset</label>
<input type="text" id="aset" placeholder="Nama benda yang dilaporkan">

<label style="margin-top:10px; display:block;">Kategori Barang</label>

<select id="kategori">
<option value="">Pilih Kategori Aset</option>
<option value="Elektronik">Elektronik</option>
<option value="Mesin">Mesin</option>
<option value="Furniture">Furniture</option>
<option value="Kendaraan">Kendaraan</option>
<option value="Bangunan">Bangunan</option>
</select>

<label style="margin-top:10px; display:block;">Deskripsi Kerusakan</label>
<textarea id="deskripsi" placeholder="Jelaskan tentang kerusakan yang ingin dilaporkan"></textarea>
<label style="margin-top:10px; display:block;">Upload Foto</label>
<input type="file" id="foto">

<button type="button" id="btnKirim" onclick="kirimLaporan()">
KIRIM LAPORAN
</button>

</form>

<div id="hasil"></div>

<br>

<a href="index.html">
<button style="
background:#6c757d;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
">
← Kembali ke Menu Utama
</button>
</a>

</div>

<script src="config.js"></script>
<script src="lapor.js"></script>

</body>
</html>
